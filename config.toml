# Site settings
baseurl = "https://danoved.xyz/blog/"
publishDir = "docs/blog"
# HTML Language Code Reference, such as en, zh-cn
languageCode = "en"
title = "Dan Oved's ITP Blog"
theme = "cactus-plus"
# Enter your tracking code to enable Google Analytics
googleAnalytics = "UA-106896744-1"
hasCJKLanguage = true
# pygmentsCodeFences = true
# pygmentsCodeFencesGuessSyntax = true
# pygmentsStyle="monokai"

timeout = 95000

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
	name = "Dan Oved's ITP Blog"
	description = "Documenting my work as a graduate student at NYU's ITP (2017–2019)"
	bio = "Documenting my work as a graduate student at NYU's ITP (2017–2019)"
	# Enter optionally your twitter account
	enableRSS = false

	# Disqus comment
	disqusShortname = "danoved"
	# Disable disqus comments by set `enableDisqus = "false"`
	enableDisqus = true 

	enableGithubIssuesTips = false

	# Enable googleAnalytics
	enableGoogleAnalytics = true

	# Add custom assets with their paths relative to the static folder
	customCSS = ["/css/style-custom.css"]
	customJS  = []

	# Navigation links
	home = ""
	about = ""
	archive = ""
	subscribe = ""
	tags = ""
	# Pagination links
	olderPosts = ""
	newerPosts = ""
	readMore = ""
	copyright = ""
	# Sharing options and author information in posts
	aboutAuthor = "This blog documents my projects and coursework as a graduate student at NYU's ITP (Interactive Telecommunications Program) from 2017 to 2019."
	tweet = ""
	share = ""
	# 404 page
	title404 = ""
	subtitle404 = ""

	# Choose a font for the social icons in the footer. Either "mono-social" or "font-awesome"
	iconFont = "font-awesome"
  # The social icons can be styled differently if you use mono as font - circle, rounded, or empty
  socialIconStyle = ""

# Add additional social link entries underneath
[social]
	#facebook-square = "https://www.facebook.com/DanOved"
  instagram = "https://www.instagram.com/stangogh/"
  #twitter-square = "your_twitter_link"
  github-square = "https://github.com/oveddan"

[taxonomies]
  tags = "tags"
  classes = "classes"
